name: Token Calculation

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
 runs-on: ubuntu-latest
 steps:
  - uses: qwibitai/nanoclaw/repo-tokens@v1
    with:
      include: 'apps/**/*.{ts,tsx}'